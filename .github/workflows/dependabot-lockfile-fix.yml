name: Dependabot lockfile fix

# Known pnpm 10 + workspace catalog + Dependabot issue: the bot emits a
# broken multi-document pnpm-lock.yaml. This workflow detects Dependabot
# PRs, regenerates the lockfile from scratch, and pushes the fix back to
# the same branch so the regular CI pipeline can install with
# `--frozen-lockfile`.

on:
  pull_request_target:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  fix-lockfile:
    name: Regenerate pnpm-lock.yaml
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Regenerate lockfile
        run: pnpm install --lockfile-only

      - name: Commit and push if lockfile changed
        run: |
          if [[ -n "$(git status --porcelain pnpm-lock.yaml)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pnpm-lock.yaml
            git commit -m "chore(deps): regenerate pnpm-lock.yaml"
            git push
          fi
