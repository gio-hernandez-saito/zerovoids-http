name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm ci:check

  type-check:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - name: Upload coverage (core)
        if: matrix.node == 20
        uses: codecov/codecov-action@v6
        with:
          files: ./packages/core/coverage/lcov.info
          flags: core
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage (auth)
        if: matrix.node == 20
        uses: codecov/codecov-action@v6
        with:
          files: ./packages/auth/coverage/lcov.info
          flags: auth
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage (adapters)
        if: matrix.node == 20
        uses: codecov/codecov-action@v6
        with:
          files: ./packages/react-query/coverage/lcov.info,./packages/swr/coverage/lcov.info
          flags: adapters
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage (transports)
        if: matrix.node == 20
        uses: codecov/codecov-action@v6
        with:
          files: ./packages/transport-ky/coverage/lcov.info,./packages/transport-axios/coverage/lcov.info
          flags: transports
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: packages/*/dist
          retention-days: 3

  size:
    name: Bundle size
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm size
