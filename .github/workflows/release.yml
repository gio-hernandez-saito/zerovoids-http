name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.repository == 'gio-hernandez-saito/zerovoids-http'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # npm 11+ required for Trusted Publishing OIDC exchange. Node 22 LTS
      # ships npm 10.x which signs provenance but fails the registry PUT.
      - name: Upgrade npm to latest (required for Trusted Publishing)
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN removed — Trusted Publishing (OIDC) authenticates via
          # id-token permission. Setting NPM_TOKEN would override OIDC.
          NPM_CONFIG_PROVENANCE: true
