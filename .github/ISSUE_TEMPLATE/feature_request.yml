name: Feature request
description: 새 기능 또는 개선 제안
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        제안 전 [Non-goals](https://github.com/gio-hernandez-saito/zerovoids-http#non-goals) 목록을 확인해주세요. 스코프 밖 항목은 받지 않습니다.

  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제를 풀고 싶나요?
      description: 현재 겪고 있는 불편/한계를 설명해주세요. 해결책이 아니라 "문제"를 먼저.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 해결책
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 기존 라이브러리(Better Fetch, Zodios, ts-rest 등)나 플러그인/어댑터로 해결 가능한지 확인

  - type: dropdown
    id: scope
    attributes:
      label: 제안 scope
      options:
        - Core API
        - 새 어댑터 패키지
        - 기존 어댑터 개선
        - 문서 / 예제
        - 빌드 / 툴링
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
